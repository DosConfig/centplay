name: centplay
description: "CentPlay - Mini Game Hub Demo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.6.1
  # Routing
  go_router: ^14.8.1
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.2.2
  # UI / Media
  webview_flutter: ^4.12.0
  # video_player / chewie 제거 — 플랫폼 채널로 직접 구현 (CentPlayVideoPlugin)
  share_plus: ^10.1.4
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  # --- 영상 재생 부가 (docs/video/ 참고) ---
  shared_preferences: ^2.3.3          # 재생 위치 resume 저장
  firebase_analytics: ^11.3.6         # video_start / rebuffer / complete 이벤트 로깅
  firebase_performance: ^0.10.0+8     # HLS 세그먼트 네트워크 trace

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/games/
    - assets/images/videos/
  fonts:
    - family: SBAggroOTF
      fonts:
        - asset: assets/fonts/SBAggroOTF-L.otf
          weight: 300
        - asset: assets/fonts/SBAggroOTF-M.otf
          weight: 500
        - asset: assets/fonts/SBAggroOTF-B.otf
          weight: 700
