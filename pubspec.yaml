name: centplay
description: "CentPlay - Mini Game Hub Demo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.6.1
  # Routing
  go_router: ^14.8.1
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.2.2
  # UI / Media
  webview_flutter: ^4.12.0
  video_player: ^2.9.4
  share_plus: ^10.1.4
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/games/
    - assets/images/videos/
