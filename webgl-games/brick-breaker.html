<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>*{margin:0;padding:0;overflow:hidden;touch-action:none}body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh}canvas{display:block;max-width:100vw;max-height:100vh}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,ball,paddle,bricks,score=0,lives=3,running=false;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;paddle={x:W/2-40,y:H-40,w:80,h:12};initBall();initBricks()}
function initBall(){ball={x:W/2,y:H-60,dx:3*(Math.random()>0.5?1:-1),dy:-4,r:8}}
function initBricks(){bricks=[];const cols=Math.floor(W/65),rows=5;const bw=(W-20)/cols-4;for(let r=0;r<rows;r++)for(let c2=0;c2<cols;c2++)bricks.push({x:12+c2*(bw+4),y:60+r*28,w:bw,h:22,alive:true,hue:r*60})}
function draw(){x.fillStyle='#0a0a0a';x.fillRect(0,0,W,H);
// Score & Lives
x.fillStyle='#fff';x.font='bold 16px sans-serif';x.fillText('Score: '+score,12,30);x.fillText('♥'.repeat(lives),W-60,30);
// Bricks
bricks.forEach(b=>{if(!b.alive)return;x.fillStyle=`hsl(${280+b.hue},80%,60%)`;x.beginPath();x.roundRect(b.x,b.y,b.w,b.h,6);x.fill()});
// Paddle
const g=x.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);g.addColorStop(0,'#e200ff');g.addColorStop(1,'#4765ff');
x.fillStyle=g;x.beginPath();x.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);x.fill();
// Ball
x.fillStyle='#fff';x.beginPath();x.arc(ball.x,ball.y,ball.r,0,Math.PI*2);x.fill();
x.fillStyle='rgba(226,0,255,0.3)';x.beginPath();x.arc(ball.x,ball.y,ball.r+4,0,Math.PI*2);x.fill();
if(!running){x.fillStyle='rgba(255,255,255,0.8)';x.font='bold 20px sans-serif';x.textAlign='center';x.fillText('TAP TO START',W/2,H/2);x.textAlign='left'}}
function update(){if(!running)return;
ball.x+=ball.dx;ball.y+=ball.dy;
if(ball.x<ball.r||ball.x>W-ball.r)ball.dx*=-1;
if(ball.y<ball.r)ball.dy*=-1;
if(ball.y>H){lives--;if(lives<=0){score=0;lives=3;initBricks()}initBall();running=false;return}
// Paddle collision
if(ball.y+ball.r>paddle.y&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){ball.dy=-Math.abs(ball.dy);ball.dx=((ball.x-(paddle.x+paddle.w/2))/paddle.w)*8}
// Brick collision
bricks.forEach(b=>{if(!b.alive)return;if(ball.x>b.x&&ball.x<b.x+b.w&&ball.y-ball.r<b.y+b.h&&ball.y+ball.r>b.y){b.alive=false;ball.dy*=-1;score+=10}});
if(bricks.every(b=>!b.alive))initBricks()}
function loop(){draw();update();requestAnimationFrame(loop)}
function moveP(ex){const tx=ex-(paddle.w/2);paddle.x=Math.max(0,Math.min(W-paddle.w,tx))}
c.addEventListener('touchmove',e=>{e.preventDefault();moveP(e.touches[0].clientX)},{passive:false});
c.addEventListener('mousemove',e=>moveP(e.clientX));
c.addEventListener('click',()=>{if(!running)running=true});
c.addEventListener('touchstart',e=>{e.preventDefault();if(!running)running=true},{passive:false});
window.addEventListener('resize',resize);
resize();loop();
</script></body></html>
