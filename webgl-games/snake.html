<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>*{margin:0;padding:0;overflow:hidden;touch-action:none}body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh}canvas{display:block}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,sz,cols,rows,snake,food,dir,ndir,score,gameOver,interval;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;sz=Math.floor(Math.min(W,H)/20);cols=Math.floor(W/sz);rows=Math.floor(H/sz);init()}
function init(){snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];dir={x:1,y:0};ndir={x:1,y:0};score=0;gameOver=false;spawnFood();if(interval)clearInterval(interval);interval=setInterval(update,120)}
function spawnFood(){food={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}}
function update(){if(gameOver)return;dir=ndir;const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
if(h.x<0||h.x>=cols||h.y<0||h.y>=rows||snake.some(s=>s.x===h.x&&s.y===h.y)){gameOver=true;return}
snake.unshift(h);if(h.x===food.x&&h.y===food.y){score+=10;spawnFood()}else snake.pop();draw()}
function draw(){x.fillStyle='#0a0a0a';x.fillRect(0,0,W,H);
// Grid dots
x.fillStyle='#1a1a1a';for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){x.fillRect(i*sz+sz/2-1,j*sz+sz/2-1,2,2)}
// Snake
snake.forEach((s,i)=>{const t=i/snake.length;x.fillStyle=i===0?'#e200ff':`hsl(280,80%,${60-t*30}%)`;x.beginPath();x.roundRect(s.x*sz+1,s.y*sz+1,sz-2,sz-2,4);x.fill()});
// Food
x.fillStyle='#4765ff';x.beginPath();x.arc(food.x*sz+sz/2,food.y*sz+sz/2,sz/3,0,Math.PI*2);x.fill();
x.fillStyle='rgba(71,101,255,0.3)';x.beginPath();x.arc(food.x*sz+sz/2,food.y*sz+sz/2,sz/2,0,Math.PI*2);x.fill();
// Score
x.fillStyle='#fff';x.font='bold 16px sans-serif';x.fillText('Score: '+score,12,28);
if(gameOver){x.fillStyle='rgba(0,0,0,0.7)';x.fillRect(0,0,W,H);x.fillStyle='#fff';x.font='bold 24px sans-serif';x.textAlign='center';x.fillText('GAME OVER',W/2,H/2-20);x.font='16px sans-serif';x.fillText('Score: '+score,W/2,H/2+15);x.fillText('TAP TO RESTART',W/2,H/2+45);x.textAlign='left'}}
// Touch controls
let tx=0,ty=0;
c.addEventListener('touchstart',e=>{e.preventDefault();if(gameOver){init();return}tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:false});
c.addEventListener('touchend',e=>{e.preventDefault();const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)){ndir=dx>0?{x:1,y:0}:{x:-1,y:0}}else{ndir=dy>0?{x:0,y:1}:{x:0,y:-1}}},{passive:false});
c.addEventListener('click',()=>{if(gameOver)init()});
document.addEventListener('keydown',e=>{const m={'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0},'w':{x:0,y:-1},'s':{x:0,y:1},'a':{x:-1,y:0},'d':{x:1,y:0}};if(m[e.key])ndir=m[e.key]});
window.addEventListener('resize',resize);resize();draw();
</script></body></html>
