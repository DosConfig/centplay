# CentPlay — 정적 분석 설정
#
# flutter_lints 를 기본으로 하고, Supercent 지원 맥락에서 중요한 추가 룰을
# 적용. 공고대응_학습/testing-qa/03_static_analysis_and_gates.md 참고.
#
# 핵심 의도:
# - 프로덕션 유출 방지 (print 금지)
# - fire-and-forget 버그 방지 (unawaited_futures)
# - async-gap context 버그 방지 (use_build_context_synchronously)
# - const rebuild 비용 절감 (prefer_const_*)
# - 위험 패턴 차단 (close_sinks · cancel_subscriptions)
#
# 톤 조정: 기존 코드 전체를 빨갛게 만들지 않도록 일부 룰은 warning 유지.
# 신규 코드는 전부 이 기준을 지킨다.

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # 프로덕션 유출 · 명백한 실수 → 에러로 승격
    avoid_print: error
    # 기존 코드에 fire-and-forget 호출이 있어 warning 유지 (점진 정리 대상).
    # 새 코드는 unawaited() 로 감싸거나 await 해야 한다.
    unawaited_futures: warning
    # BuildContext async gap 은 런타임 이슈로 직결 → 에러
    use_build_context_synchronously: error
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - '**/generated/**'
    - 'build/**'

linter:
  rules:
    # 성능 / 일관성
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - prefer_const_declarations
    # 위험 패턴 차단
    - unawaited_futures
    - use_build_context_synchronously
    - avoid_print
    - cancel_subscriptions
    - close_sinks
    - no_adjacent_strings_in_list
    # 팀 컨벤션
    - sort_child_properties_last
