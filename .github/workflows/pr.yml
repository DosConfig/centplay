# PR Quality Gate
#
# 공고대응_학습/testing-qa/02_ci_automation.md §2 참고.
#
# 의도:
# - PR 열리면 1~2분 내 format · analyzer · test 통과 여부 확인
# - 작은 실수 (format · analyzer 경고) 도 빨간불로 빨리 잡음
# - Debug 빌드까지 해서 "일단 돌아가는가" 까지 확인
#
# Supercent 팀에 들어가면 이 파일을 그대로 가져가서 branch protection
# 에 required check 로 걸어두는 것이 기본 구성.

name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # pubspec.lock: dart >=3.9.2, flutter >=3.35.0
  # stable 채널로 최신 릴리스 고정. 팀 투입 시엔 특정 버전 pin 권장.
  FLUTTER_CHANNEL: 'stable'
  FLUTTER_VERSION: '3.35.x'

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Format & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --set-exit-if-changed .
      - name: Static analysis
        run: flutter analyze --fatal-infos

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Run tests with coverage
        run: flutter test --coverage --reporter=expanded
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  build_android:
    name: Android Debug Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build debug APK
        run: flutter build apk --debug --target-platform=android-arm64

  # iOS 빌드는 macOS runner 가 비싸서 PR 에선 제외.
  # main 병합 후 main.yml 에서 돌리거나 nightly 로 분리하는 것이 비용 효율.
